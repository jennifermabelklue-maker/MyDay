# STRAVA HELPERS
# ============================================================

def strava_config():
    return {
        "client_id": str(st.secrets.get("STRAVA_CLIENT_ID", "")),
        "client_secret": st.secrets.get("STRAVA_CLIENT_SECRET", ""),
        "redirect_uri": st.secrets.get("STRAVA_REDIRECT_URI", "http://localhost:8501"),
    }


def get_strava_auth_url():
    cfg = strava_config()

    params = {
        "client_id": cfg["client_id"],
        "redirect_uri": cfg["redirect_uri"],
        "response_type": "code",
        "approval_prompt": "force",
        "scope": "read,activity:read_all",
    }

    return "https://www.strava.com/oauth/authorize?" + urlencode(params)


def get_strava_token():
    rows = query(
        """
        SELECT athlete_id, firstname, lastname, access_token, refresh_token, expires_at, scope
        FROM strava_tokens
        WHERE id = 1
        """,
        fetch=True
    )

    if not rows:
        return None

    return {
        "athlete_id": rows[0][0],
        "firstname": rows[0][1],
        "lastname": rows[0][2],
        "access_token": rows[0][3],
        "refresh_token": rows[0][4],
        "expires_at": rows[0][5],
        "scope": rows[0][6],
    }


def save_strava_token(token_data):
    athlete = token_data.get("athlete", {})

    query(
        """
        INSERT OR REPLACE INTO strava_tokens (
            id, athlete_id, firstname, lastname, access_token,
            refresh_token, expires_at, scope, connected_at
        )
        VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
        """,
        (
            1,
            athlete.get("id"),
            athlete.get("firstname", ""),
            athlete.get("lastname", ""),
            token_data.get("access_token"),
            token_data.get("refresh_token"),
            token_data.get("expires_at"),
            token_data.get("scope", ""),
            datetime.now().isoformat(timespec="seconds"),
        )
    )


def exchange_strava_code(code):
    cfg = strava_config()

    response = requests.post(
        "https://www.strava.com/oauth/token",
        data={
            "client_id": cfg["client_id"],
            "client_secret": cfg["client_secret"],
            "code": code,
            "grant_type": "authorization_code",
        },
        timeout=20
    )

    if response.status_code != 200:
        st.error(response.json())
        return False

    save_strava_token(response.json())
    return True


def refresh_strava_token_if_needed():
    token = get_strava_token()

    if not token:
        return None

    if int(token["expires_at"]) > int(time.time()) + 300:
        return token["access_token"]

    cfg = strava_config()

    response = requests.post(
        "https://www.strava.com/oauth/token",
        data={
            "client_id": cfg["client_id"],
            "client_secret": cfg["client_secret"],
            "grant_type": "refresh_token",
            "refresh_token": token["refresh_token"],
        },
        timeout=20
    )

    if response.status_code != 200:
        st.error(response.json())
        return None

    new_data = response.json()
    new_data["athlete"] = {
        "id": token["athlete_id"],
        "firstname": token["firstname"],
        "lastname": token["lastname"],
    }

    save_strava_token(new_data)
    return new_data["access_token"]


def fetch_strava_activities(per_page=50):
    access_token = refresh_strava_token_if_needed()

    if not access_token:
        return []

    response = requests.get(
        "https://www.strava.com/api/v3/athlete/activities",
        headers={"Authorization": f"Bearer {access_token}"},
        params={"page": 1, "per_page": per_page},
        timeout=20
    )

    if response.status_code != 200:
        st.error(response.json())
        return []

    return response.json()


def save_strava_activities(activities):
    for activity in activities:
        query(
            """
            INSERT OR REPLACE INTO strava_activities (
                id, name, sport_type, activity_type, distance, moving_time,
                elapsed_time, total_elevation_gain, start_date,
                average_speed, max_speed, calories, synced_at
            )
            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)
            """,
            (
                activity.get("id"),
                activity.get("name", ""),
                activity.get("sport_type", ""),
                activity.get("type", ""),
                activity.get("distance", 0),
                activity.get("moving_time", 0),
                activity.get("elapsed_time", 0),
                activity.get("total_elevation_gain", 0),
                activity.get("start_date", ""),
                activity.get("average_speed", 0),
                activity.get("max_speed", 0),
                activity.get("calories", 0),
                datetime.now().isoformat(timespec="seconds"),
            )
        )


def disconnect_strava():
    query("DELETE FROM strava_tokens WHERE id = 1")
